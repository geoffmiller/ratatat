name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Build native .node for each platform ──────────────────────────────────
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # arm64
            target: aarch64-apple-darwin
            build-flags: --target aarch64-apple-darwin
          - os: macos-13 # x64 (macos-13 is the last Intel runner)
            target: x86_64-apple-darwin
            build-flags: --target x86_64-apple-darwin
          - os: ubuntu-latest # x64
            target: x86_64-unknown-linux-gnu
            build-flags: --target x86_64-unknown-linux-gnu
          - os: ubuntu-latest # arm64 via cross-compile
            target: aarch64-unknown-linux-gnu
            build-flags: --target aarch64-unknown-linux-gnu --use-napi-cross
          - os: windows-latest # x64
            target: x86_64-pc-windows-msvc
            build-flags: --target x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build native binary
        run: npx napi build --platform --release --js false --no-const-enum ${{ matrix.build-flags }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

  # ─── Pack fat tarball with all .node files + TypeScript dist ───────────────
  pack-and-release:
    name: Pack and release
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build:ts

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: .

      - name: List .node files
        run: ls -lh *.node

      - name: Run tests (with linux native)
        run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Rename tarball to fixed name
        # npm pack produces ratatat-X.Y.Z.tgz — rename so the release URL is stable
        run: mv ratatat-*.tgz ratatat.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ratatat.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
